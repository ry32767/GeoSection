name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add pages-worktree origin/gh-pages
          else
            git worktree add --detach pages-worktree HEAD
            git -C pages-worktree switch --orphan gh-pages
          fi
          find pages-worktree -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R dist/. pages-worktree/
          git -C pages-worktree add .
          git -C pages-worktree commit -m "Deploy GitHub Pages" || exit 0
          git -C pages-worktree push origin HEAD:gh-pages
