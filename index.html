<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="GPX から地図、断面図、傾斜図、標高補完済み GPX を生成する静的ツール" />
    <title>GeoSection</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">GPX route analyzer</p>
        <h1>GeoSection</h1>
      </div>
      <a class="source-link" href="https://github.com/ry32767/GeoSection" target="_blank" rel="noopener noreferrer">GitHub</a>
    </header>

    <main class="app-shell">
      <section class="control-panel" aria-label="GPX 入力">
        <div class="file-control">
          <label for="gpx-file">GPX ファイル</label>
          <input id="gpx-file" type="file" accept=".gpx,application/gpx+xml,application/xml,text/xml" />
        </div>

        <div class="settings-grid">
          <label>
            標高 API
            <input id="elevation-endpoint" type="url" value="https://api.open-elevation.com/api/v1/lookup" />
          </label>
          <label>
            補完バッチ数
            <input id="batch-size" type="number" min="1" max="100" value="80" />
          </label>
          <label>
            傾斜平滑化
            <input id="smoothing-window" type="range" min="1" max="25" value="9" />
          </label>
          <output id="smoothing-output" for="smoothing-window">9 点</output>
        </div>

        <div class="actions">
          <button id="download-gpx" type="button" disabled>補完済み GPX を保存</button>
          <button id="fit-map" type="button" disabled>全体表示</button>
        </div>

        <div id="status" class="status" role="status" aria-live="polite">GPX ファイルを選択してください。</div>
      </section>

      <section class="route-library" aria-label="登録済み GPX">
        <div class="panel-title">
          <h2>登録済み GPX</h2>
          <span id="route-library-note">読み込み中</span>
        </div>
        <div id="route-buttons" class="route-buttons"></div>
      </section>

      <section class="summary-band" aria-label="ルート概要">
        <div>
          <span>距離</span>
          <strong id="metric-distance">-</strong>
        </div>
        <div>
          <span>累積上昇</span>
          <strong id="metric-ascent">-</strong>
        </div>
        <div>
          <span>累積下降</span>
          <strong id="metric-descent">-</strong>
        </div>
        <div>
          <span>標高範囲</span>
          <strong id="metric-elevation">-</strong>
        </div>
      </section>

      <section class="export-panel" aria-label="印刷・エクスポート">
        <div class="panel-title">
          <h2>印刷・エクスポート</h2>
          <span id="export-note">GPX 読み込み後に出力できます</span>
        </div>
        <div class="export-controls">
          <label>
            用紙
            <select id="paper-size">
              <option value="a4-landscape">A4 横</option>
              <option value="a4-portrait">A4 縦</option>
              <option value="a3-landscape">A3 横</option>
              <option value="a3-portrait">A3 縦</option>
              <option value="wide">ワイド 16:9</option>
            </select>
          </label>
          <label>
            強調比（x：y）
            <input id="export-exaggeration" type="range" min="1" max="20" step="0.5" value="2" />
          </label>
          <output id="export-exaggeration-output" for="export-exaggeration">1：2</output>
          <label>
            断面図の色
            <input id="elevation-color" type="color" value="#001eff" />
          </label>
          <label>
            傾斜図の色
            <input id="slope-color" type="color" value="#008000" />
          </label>
          <label>
            用紙余白
            <input id="page-margin" type="range" min="4" max="16" value="8" />
          </label>
          <output id="page-margin-output" for="page-margin">8%</output>
          <label>
            プレビュー幅
            <input id="preview-scale" type="range" min="45" max="100" value="100" />
          </label>
          <output id="preview-scale-output" for="preview-scale">100%</output>
          <label>
            出力形式
            <select id="export-format">
              <option value="png">PNG</option>
              <option value="pdf">PDF</option>
            </select>
          </label>
          <button id="export-elevation" type="button" disabled>断面図を保存</button>
          <button id="export-slope" type="button" disabled>傾斜図を保存</button>
        </div>
        <div class="export-preview-grid">
          <div class="export-preview">
            <canvas id="export-elevation-canvas" aria-label="印刷用断面図"></canvas>
          </div>
          <div class="export-preview">
            <canvas id="export-slope-canvas" aria-label="印刷用傾斜図"></canvas>
          </div>
        </div>
      </section>

      <section class="workspace-grid">
        <div class="map-column">
          <section class="map-tools" aria-label="地図から断面図">
            <div class="panel-title">
              <h2>地図から断面図</h2>
              <span id="map-pick-note">住所検索 / 地図で2点クリック</span>
            </div>
            <div class="map-tools-row">
              <div class="map-search">
                <input id="place-search" type="text" placeholder="住所・地名・緯度経度で検索（例: 富士山 / 35.36, 138.73）" aria-label="場所を検索" autocomplete="off" />
                <button id="place-search-button" type="button">検索</button>
                <ul id="place-results" class="place-results" role="listbox" hidden></ul>
              </div>
              <div class="actions">
                <button id="pick-toggle" type="button" aria-pressed="false">2点選択を開始</button>
                <button id="pick-clear" type="button" disabled>選択をクリア</button>
              </div>
            </div>
          </section>
          <div class="map-panel" aria-label="地図">
            <div id="map"></div>
          </div>
        </div>

        <div class="chart-stack">
          <div class="chart-panel">
            <div class="panel-title">
              <h2>断面図</h2>
              <span id="elevation-note">標高データ待機中</span>
            </div>
            <canvas id="elevation-chart" aria-label="断面図"></canvas>
          </div>

          <div class="chart-panel">
            <div class="panel-title">
              <h2>傾斜図</h2>
              <div class="title-controls">
                <select id="slope-mode" aria-label="傾斜の表示方法">
                  <option value="angle">傾斜角 [度]</option>
                  <option value="grade">勾配 [%]</option>
                </select>
                <span id="slope-note">傾斜データ待機中</span>
              </div>
            </div>
            <canvas id="slope-chart" aria-label="傾斜図"></canvas>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
    <script type="module" src="./app.js?v=20260625-search-enhance"></script>
  </body>
</html>
